data:
  dataset_name: metr-la
  num_sensors: 207
  num_features: 2
  seq_len: 12
  horizon: 12
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  raw_dir: data/raw
  adj_sigma: 10.0
  adj_threshold: 0.1

model:
  name: dcrnn
  input_dim: 2
  output_dim: 1
  rnn_units: 32
  num_rnn_layers: 2
  max_diffusion_step: 1
  filter_type: dual_random_walk
  cl_decay_steps: 2000

training:
  batch_size: 64
  epochs: 5
  lr: 0.001
  lr_decay_ratio: 0.5
  lr_decay_steps: [20, 40, 60]
  optimizer: adam
  loss: masked_mae
  clip_grad_norm: 5.0
  patience: 10
  seed: 2026

safety:
  w_speed_drop: 0.5
  w_variability: 0.2
  w_neighbourhood: 0.3
  free_flow_mph: 55.0
  alert_threshold: 0.6
  lookahead_steps: 3
